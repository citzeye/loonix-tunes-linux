name: Birthday Release Build

on:
  push:
    tags:
      - "v*" # Trigger: git tag v1.0.0 && git push origin v1.0.0

jobs:
  # --- BUILD LINUX (APPIMAGE) ---
  linux-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev ffmpeg libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev libavutil-dev libswresample-dev pipewire libpipewire-0.3-dev libwayland-dev libasound2-dev librubberband-dev libsoxr-dev libfftw3-dev libdbus-1-dev libglib2.0-dev libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Build Rust
        run: cargo build --release

      - name: Package Linux
        run: |
          # 1. Wajib install libfuse2 buat jalanin AppImage di Ubuntu baru
          sudo apt-get install -y libfuse2

          # 2. Bikin struktur folder standar Linux
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # 3. Copy binary (Pake wildcard * biar aman dari typo strip/underscore)
          cp target/release/loonix*tunes AppDir/usr/bin/loonix-tunes
          chmod +x AppDir/usr/bin/loonix-tunes

          # 4. Copy Desktop file & Icon (Pastikan file ini ada di repo lo!)
          cp packaging/linux/loonix-tunes.desktop AppDir/usr/share/applications/
          cp packaging/linux/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/loonix-tunes.png

          # 5. Jalankan linuxdeployqt (Tanpa flag -bundle-libs)
          wget -c https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage

          # Gunakan --appimage-extract-and-run dan arahkan qmake ke Qt6
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/loonix-tunes.desktop -appimage -qmake=$(which qmake6 || which qmake)

          # 6. Siapkan folder portable buat di-upload
          mkdir -p loonix-tunes-portable
          cp -r AppDir/usr/bin/* loonix-tunes-portable/
          cp -r AppDir/usr/lib loonix-tunes-portable/ 2>/dev/null || true

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-appimage
          path: "*.AppImage"

      - name: Create Portable Tarball
        run: |
          tar -czvf loonix-tunes-linux-x64-portable.tar.gz loonix-tunes-portable/

      - name: Upload Tarball Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-tarball
          path: "*.tar.gz"

  # --- BUILD WINDOWS (ZIP) ---
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Install Git LFS
        run: choco install git-lfs -y

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"

      - name: Setup MSVC Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup VCPKG & Fake pkg-config
        shell: pwsh
        run: |
          # 1. Install pake nama yang bener: soxr (bukan libsoxr)
          $vcpkg_exe = "C:\vcpkg\vcpkg.exe"
          & $vcpkg_exe install soxr:x64-windows rubberband:x64-windows --vcpkg-root="C:\vcpkg"

          # 2. Pastiin folder tujuan ada
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\packaging\windows\libs"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\packaging\windows\include"

          # 3. Copy file dari folder soxr_x64-windows (bukan libsoxr_x64-windows)
          Copy-Item -Path "C:\vcpkg\packages\soxr_x64-windows\lib\soxr.lib" -Destination "${{ github.workspace }}\packaging\windows\libs\" -Force
          Copy-Item -Path "C:\vcpkg\packages\soxr_x64-windows\include\soxr.h" -Destination "${{ github.workspace }}\packaging\windows\include\" -Force

          Copy-Item -Path "C:\vcpkg\packages\rubberband_x64-windows\lib\rubberband.lib" -Destination "${{ github.workspace }}\packaging\windows\libs\" -Force
          Copy-Item -Path "C:\vcpkg\packages\rubberband_x64-windows\include\*" -Destination "${{ github.workspace }}\packaging\windows\include\" -Recurse -Force

          # 4. Hack pkg-config tetep sama
          choco install pkgconfiglite --no-progress
          $pc_dir = "${{ github.workspace }}\packaging\windows\pkgconfig"
          New-Item -ItemType Directory -Force -Path $pc_dir

          $libs_dir = "${{ github.workspace }}\packaging\windows\libs" -replace '\\', '/'
          $inc_dir = "${{ github.workspace }}\packaging\windows\include" -replace '\\', '/'

          @"
          Name: soxr
          Description: SoX Resampler
          Version: 0.1.3
          Libs: -L$libs_dir -lsoxr
          Cflags: -I$inc_dir
          "@ | Out-File -FilePath "$pc_dir\soxr.pc" -Encoding ascii

          @"
          Name: rubberband
          Description: Rubber Band
          Version: 3.0.0
          Libs: -L$libs_dir -lrubberband
          Cflags: -I$inc_dir
          "@ | Out-File -FilePath "$pc_dir\rubberband.pc" -Encoding ascii

      - name: Build Rust
        shell: pwsh
        run: |
          # Install pkg-config and make sure it's in PATH
          choco install pkgconfiglite --no-progress
          $env:Path = "C:\ProgramData\chocolatey\lib\pkgconfiglite\tools\pkgconfiglite\bin;" + $env:Path

          $env:PKG_CONFIG_PATH = "${{ github.workspace }}\packaging\windows\pkgconfig"
          $env:FFMPEG_DIR = "${{ github.workspace }}\packaging\windows"

          $libs = "${{ github.workspace }}\packaging\windows\libs"
          $includes = "${{ github.workspace }}\packaging\windows\include"

          $env:LIB = "$libs;" + $env:LIB
          $env:INCLUDE = "$includes;" + $env:INCLUDE

          cargo build --release --target x86_64-pc-windows-msvc

      - name: Deploy Windows
        shell: bash
        run: |
          mkdir release-win
          cp target/x86_64-pc-windows-msvc/release/loonix-tunes.exe release-win/
          cp packaging/windows/*.dll release-win/

          windeployqt.exe release-win/loonix-tunes.exe --qmldir qml/ --no-translations

          7z a loonix-tunes-${{ github.ref_name }}-win64.zip ./release-win/*

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-windows
          path: "*.zip"

  # --- PUBLISH EVERYTHING ---
  publish:
    needs: [linux-release, windows-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.AppImage
            **/*.tar.gz
            **/*.zip
          body: "Loonix-Tunes v1.0.0 - Birthday Release 🎂\n\nEfficient, Native, and Fast."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

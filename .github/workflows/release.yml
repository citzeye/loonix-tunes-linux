name: Birthday Release Build

on:
  push:
    tags:
      - "v*" # Trigger: git tag v1.0.0 && git push origin v1.0.0

jobs:
  # --- BUILD LINUX (APPIMAGE) ---
  linux-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev ffmpeg libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev libavutil-dev libswresample-dev pipewire libpipewire-0.3-dev libwayland-dev libasound2-dev librubberband-dev libsoxr-dev libfftw3-dev libdbus-1-dev

      - name: Build Rust
        run: cargo build --release

      - name: Bundle AppImage
        run: |
          wget -c https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt

          mkdir -p AppDir
          cp target/release/loonix-tunes AppDir/
          cp packaging/linux/loonix-tunes.desktop AppDir/
          cp packaging/linux/icon.png AppDir/

          export PATH=/usr/lib/qt6/bin:$PATH
          ./linuxdeployqt AppDir/loonix-tunes.desktop -appimage -qmake=/usr/lib/qt6/bin/qmake

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-appimage
          path: "*.AppImage"

      - name: Create Portable Tarball
        run: |
          mkdir -p loonix-tunes-portable
          cp -r AppDir/usr/bin/* loonix-tunes-portable/
          cp -r AppDir/usr/lib loonix-tunes-portable/
          cp -r AppDir/usr/plugins loonix-tunes-portable/ 2>/dev/null || true

          echo '#!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/plugins"
          exec "$HERE/loonix-tunes" "$@"' > loonix-tunes-portable/loonix-tunes.sh

          chmod +x loonix-tunes-portable/loonix-tunes.sh
          tar -czvf loonix-tunes-linux-x64-portable.tar.gz loonix-tunes-portable/

      - name: Upload Tarball Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-tarball
          path: "*.tar.gz"

  # --- BUILD WINDOWS (ZIP) ---
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"

      - name: Setup MSVC Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup VCPKG & Fake pkg-config
        shell: pwsh
        run: |
          # 1. Paksa pake vcpkg global dan tentuin root-nya biar gak nyasar
          $vcpkg_exe = "C:\vcpkg\vcpkg.exe"
          & $vcpkg_exe install libsoxr:x64-windows rubberband:x64-windows --vcpkg-root="C:\vcpkg"

          # 2. Pastiin folder tujuan ada dulu biar Copy-Item gak ngamuk
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\packaging\windows\libs"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\packaging\windows\include"

          # 3. Copy file hasil compile (Path vcpkg default di GitHub runner)
          Copy-Item -Path "C:\vcpkg\packages\libsoxr_x64-windows\lib\soxr.lib" -Destination "${{ github.workspace }}\packaging\windows\libs\" -Force
          Copy-Item -Path "C:\vcpkg\packages\libsoxr_x64-windows\include\soxr.h" -Destination "${{ github.workspace }}\packaging\windows\include\" -Force

          Copy-Item -Path "C:\vcpkg\packages\rubberband_x64-windows\lib\rubberband.lib" -Destination "${{ github.workspace }}\packaging\windows\libs\" -Force
          Copy-Item -Path "C:\vcpkg\packages\rubberband_x64-windows\include\*" -Destination "${{ github.workspace }}\packaging\windows\include\" -Recurse -Force

          # 4. Hack pkg-config (sama kayak tadi)
          choco install pkgconfiglite --no-progress
          $pc_dir = "${{ github.workspace }}\packaging\windows\pkgconfig"
          New-Item -ItemType Directory -Force -Path $pc_dir

          $libs_dir = "${{ github.workspace }}\packaging\windows\libs" -replace '\\', '/'
          $inc_dir = "${{ github.workspace }}\packaging\windows\include" -replace '\\', '/'

          @"
          Name: soxr
          Description: SoX Resampler
          Version: 0.1.3
          Libs: -L$libs_dir -lsoxr
          Cflags: -I$inc_dir
          "@ | Out-File -FilePath "$pc_dir\soxr.pc" -Encoding ascii

          @"
          Name: rubberband
          Description: Rubber Band
          Version: 3.0.0
          Libs: -L$libs_dir -lrubberband
          Cflags: -I$inc_dir
          "@ | Out-File -FilePath "$pc_dir\rubberband.pc" -Encoding ascii

      - name: Build Rust
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}\packaging\windows\pkgconfig"
          $env:FFMPEG_DIR = "${{ github.workspace }}\packaging\windows"
          $env:INCLUDE = "${{ github.workspace }}\packaging\windows\include;" + $env:INCLUDE
          $env:LIB = "${{ github.workspace }}\packaging\windows\libs;" + $env:LIB
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Deploy Windows
        shell: bash
        run: |
          mkdir release-win
          cp target/x86_64-pc-windows-msvc/release/loonix-tunes.exe release-win/
          cp packaging/windows/*.dll release-win/

          windeployqt.exe release-win/loonix-tunes.exe --qmldir qml/

          7z a loonix-tunes-${{ github.ref_name }}-win64.zip ./release-win/*

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-windows
          path: "*.zip"

  # --- PUBLISH EVERYTHING ---
  publish:
    needs: [linux-release, windows-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.AppImage
            **/*.tar.gz
            **/*.zip
          body: "Loonix-Tunes v1.0.0 - Birthday Release 🎂\n\nEfficient, Native, and Fast."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
